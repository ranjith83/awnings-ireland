<div class="workflow-page">
  <!-- Header with Customer Name and Back Button -->
  <div class="workflow-header">
    <div class="header-content">
      <button *ngIf="customerName !== 'Customers'" class="back-btn" (click)="goBackToCustomers()">
        ← Back to Customers
      </button>
      <h1 class="workflow-title">{{ customerName }}</h1>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="tabs-container">
    <div class="tabs-nav">
      <button
        *ngFor="let tab of tabs"
        class="tab-btn"
        [class.active]="isActive(tab.path)"
        [class.tab-completed]="isTabCompleted(tab)"
        [class.tab-locked]="isTabLocked(tab)"
        [title]="isTabLocked(tab) ? 'Complete &quot;' + (getBlockingStep(tab.path) || '') + '&quot; first' : tab.label"
        (click)="navigateToTab(tab)">
        <span *ngIf="isTabCompleted(tab)" class="tab-status-icon">✓</span>
        <span *ngIf="isTabLocked(tab) && !isTabCompleted(tab)" class="tab-status-icon">🔒</span>
        {{ tab.label }}
      </button>
    </div>
  </div>

  <!-- Tab Content Area -->
  <div class="tab-content">
    <router-outlet></router-outlet>
  </div>
</div>
