<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
    <!-- Logo Section -->
    <div class="sidebar-header" [class.sidebar-header--logo]="!isSidebarCollapsed">
      <img class="logo-generic" [src]="clientConfig.assets.logoUrl" [alt]="clientConfig.appName" />
    </div>

    <!-- Toggle Button — floats on the right border of the sidebar -->
    <button class="toggle-btn" (click)="toggleSidebar()">
      <span *ngIf="!isSidebarCollapsed">‹</span>
      <span *ngIf="isSidebarCollapsed">›</span>
    </button>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
      <div 
        *ngFor="let item of menuItems" 
        class="nav-item" 
        [class.active]="isActive(item.route)"
        (click)="navigateTo(item.route)">
        <!--<span class="nav-icon">{{ item.icon }}</span>-->
        <fa-icon [icon]="item.icon" class="nav-icon"></fa-icon>
        <span class="nav-label" *ngIf="!isSidebarCollapsed">{{ item.label }}</span>
        <span class="nav-badge" *ngIf="item.badge && !isSidebarCollapsed">{{ item.badge }}</span>
      </div>
    </nav>

    <!-- User Profile -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">{{ userInitials }}</div>
        <div class="user-info" *ngIf="!isSidebarCollapsed">
          <div class="user-name">{{ userDisplayName }}</div>
          <div class="user-role">{{ userRole }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" *ngIf="!isSidebarCollapsed">
        <span class="logout-icon">🚪</span>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content" [class.expanded]="isSidebarCollapsed">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="menu-btn" (click)="toggleSidebar()">
          <span class="menu-icon">☰</span>
        </button>
        <h2 class="page-title">{{ pageTitle }}</h2>
      </div>
      <div class="top-bar-right">
        <!-- ── Notification Bell ──────────────────────────────────── -->
        <div class="notif-bell-wrapper">
          <button class="icon-btn notif-bell-btn" (click)="toggleNotifDropdown()">
            <span class="notification-icon">🔔</span>
            <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </button>

          <div class="notif-dropdown" *ngIf="showNotifDropdown">
            <div class="notif-dropdown-header">
              <span class="notif-dropdown-title">Notifications</span>
              <button class="notif-mark-all" (click)="markAllNotifRead()" *ngIf="notifItems.length">
                Mark all read
              </button>
            </div>

            <div class="notif-list" *ngIf="notifItems.length; else noNotifs">
              <div class="notif-item" *ngFor="let n of notifItems" (click)="markNotifRead(n)">
                <div class="notif-item-icon notif-icon--enquiry" *ngIf="n.type === 'new_enquiry'">📩</div>
                <div class="notif-item-icon" *ngIf="n.type !== 'new_enquiry'">🔔</div>
                <div class="notif-item-body">
                  <div class="notif-item-title">{{ n.title }}</div>
                  <div class="notif-item-msg">{{ n.message }}</div>
                  <div class="notif-item-time">{{ n.createdAt | date:'dd MMM, HH:mm' }}</div>
                </div>
              </div>
            </div>
            <ng-template #noNotifs>
              <div class="notif-empty">No new notifications</div>
            </ng-template>
          </div>
        </div>
      </div>
    </header>

    <!-- Router Outlet -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
